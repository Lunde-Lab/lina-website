<!DOCTYPE html>
<html lang="en" data-i18n-title="cs.pageTitle">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Care Schedule — Lina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #0D6B64;
      --primary-dark: #0a5650;
      --amber: #E0A040;
      --amber-dark: #c8902e;
      --bg: #F8F8F6;
      --text: #1A1E23;
      --text-secondary: #50565E;
      --border: #E2E2DE;
      --cell-a: #0D6B64;
      --cell-b: #E0A040;
      --weekend-bg: #F4F4F0;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }

    /* ── Nav ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-size: 20px;
      font-weight: 600;
      color: var(--primary);
      letter-spacing: -0.02em;
    }
    .lang-switcher { display: flex; gap: 2px; }
    .lang-btn {
      background: none;
      border: none;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 5px 7px;
      border-radius: 5px;
      transition: color 0.15s, background 0.15s;
      letter-spacing: 0.02em;
    }
    .lang-btn:hover { color: var(--text); background: var(--border); }
    .lang-btn.active { color: var(--primary); font-weight: 600; }
    .btn-appstore {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--text);
      color: #fff;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-appstore:hover { background: #2c333b; }
    .btn-appstore svg { flex-shrink: 0; }

    /* ── Main layout ── */
    main { padding: 48px 24px 80px; }
    .container { max-width: 1080px; margin: 0 auto; }

    .page-header { margin-bottom: 32px; }
    .page-header h1 {
      font-size: clamp(24px, 4vw, 36px);
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    /* ── Inputs ── */
    .inputs-row {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 28px;
      padding: 24px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-width: 140px;
    }
    .input-group label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-secondary);
    }
    .input-group input {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      transition: border-color 0.15s;
    }
    .input-group input:focus {
      outline: none;
      border-color: var(--primary);
    }
    .input-hint {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    .input-group input[type="number"] { max-width: 100px; }

    /* ── Parent legend ── */
    .legend {
      display: flex;
      gap: 20px;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
    }
    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .legend-dot-a { background: var(--cell-a); }
    .legend-dot-b { background: var(--cell-b); }

    /* ── Grid ── */
    .grid-wrapper {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      margin-bottom: 20px;
    }
    .grid-table { min-width: 580px; width: 100%; }

    .grid-header,
    .grid-row {
      display: grid;
      grid-template-columns: 130px repeat(7, 1fr);
    }
    .grid-header {
      border-bottom: 2px solid var(--border);
      background: var(--bg);
      border-radius: 11px 11px 0 0;
    }
    .grid-row { border-bottom: 1px solid var(--border); }
    .grid-row:last-child { border-bottom: none; }

    .grid-week-col { /* header spacer */ }

    .grid-day-header {
      padding: 10px 4px;
      text-align: center;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-secondary);
      border-left: 1px solid var(--border);
    }
    .grid-day-header.weekend { background: var(--weekend-bg); }
    .grid-day-header.sep { border-left: 2px solid #C8C8C2; }

    .grid-week-label {
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      justify-content: center;
      border-right: 1px solid var(--border);
      min-height: 60px;
    }
    .week-num {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
    }
    .week-dates {
      font-size: 11px;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .grid-cell {
      min-height: 60px;
      border-left: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.1s, background 0.12s;
      user-select: none;
      font-size: 13px;
      font-weight: 600;
      position: relative;
    }
    .grid-cell.weekend { background: var(--weekend-bg); }
    .grid-cell.sep { border-left: 2px solid #C8C8C2; }
    .grid-cell:hover { opacity: 0.8; }
    .grid-cell:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: -2px;
      z-index: 1;
    }
    .grid-cell.cell-a { background: var(--cell-a) !important; color: #fff; }
    .grid-cell.cell-b { background: var(--cell-b) !important; color: #fff; }
    .grid-cell .cell-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.01em;
      pointer-events: none;
      max-width: 90%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: center;
      padding: 0 4px;
    }

    /* ── Actions ── */
    .actions-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 36px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      white-space: nowrap;
    }
    .btn:hover { background: var(--bg); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-ghost-danger {
      color: #b94040;
      border-color: var(--border);
    }
    .btn-ghost-danger:hover { background: #fff5f5; border-color: #e8c0c0; }
    .btn-dark {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
      margin-left: auto;
    }
    .btn-dark:hover { background: #2c333b; }
    .btn i, .btn [data-lucide] { width: 14px; height: 14px; }

    /* ── Stats ── */
    .stats-panel {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
    }
    .stats-heading {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 28px;
    }
    .stat-block { display: flex; flex-direction: column; gap: 10px; }
    .stat-block-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .stat-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--text);
    }
    .stat-swatch {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .stat-swatch-a { background: var(--cell-a); }
    .stat-swatch-b { background: var(--cell-b); }
    .stat-bar-wrap {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 2px;
    }
    .stat-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.35s ease;
    }
    .stat-bar-fill-a { background: var(--cell-a); }
    .stat-bar-fill-b { background: var(--cell-b); }
    .stat-single {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    /* ── Footer ── */
    footer { border-top: 1px solid var(--border); padding: 40px 24px; }
    .footer-inner {
      max-width: 1080px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }
    .footer-logo { font-size: 16px; font-weight: 600; color: var(--primary); }
    .footer-links { display: flex; gap: 24px; flex-wrap: wrap; }
    .footer-links a { font-size: 14px; color: var(--text-secondary); transition: color 0.15s; }
    .footer-links a:hover { color: var(--text); }
    .footer-copy { width: 100%; font-size: 13px; color: var(--text-secondary); margin-top: 8px; }

    @media (max-width: 600px) {
      .footer-inner { flex-direction: column; align-items: flex-start; }
      .btn-dark { margin-left: 0; }
    }

    @media print { nav, footer, .actions-row, .inputs-row { display: none !important; } }
  </style>
</head>
<body>

  <!-- Nav -->
  <nav>
    <div class="nav-inner">
      <a href="index.html"><img src="assets/logos/Logomark_1.svg" alt="Lina" height="32" /></a>
      <div class="lang-switcher" role="group" data-i18n-aria="nav.langLabel" aria-label="Language">
        <button class="lang-btn" data-lang="en" aria-current="true">EN</button>
        <button class="lang-btn" data-lang="no" aria-current="false">NO</button>
        <button class="lang-btn" data-lang="sv" aria-current="false">SV</button>
        <button class="lang-btn" data-lang="da" aria-current="false">DA</button>
        <button class="lang-btn" data-lang="fi" aria-current="false">FI</button>
      </div>
      <a href="#" class="btn-appstore" aria-label="Download on the App Store" data-i18n-aria="nav.appstoreAria">

          <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
        </svg>
        <span data-i18n="nav.appstore">App Store</span>
      </a>
    </div>
  </nav>

  <!-- Main -->
  <main>
    <div class="container">

      <div class="page-header">
        <h1 data-i18n="cs.heading">Care Schedule</h1>
      </div>

      <!-- Inputs -->
      <div class="inputs-row">
        <div class="input-group">
          <label for="input-parent-a" data-i18n="cs.labelParentA">Parent A name</label>
          <input id="input-parent-a" type="text" autocomplete="off" spellcheck="false" />
        </div>
        <div class="input-group">
          <label for="input-parent-b" data-i18n="cs.labelParentB">Parent B name</label>
          <input id="input-parent-b" type="text" autocomplete="off" spellcheck="false" />
        </div>
        <div class="input-group">
          <label for="input-start-date" data-i18n="cs.labelStartDate">Start date</label>
          <input id="input-start-date" type="date" />

        </div>
        <div class="input-group">
          <label for="input-weeks" data-i18n="cs.labelWeeks">Number of weeks</label>

      </div>

      <!-- Legend -->
      <div class="legend" id="legend">
        <div class="legend-item">
          <span class="legend-dot legend-dot-a"></span>
          <span id="legend-a">Parent A</span>
        </div>
        <div class="legend-item">
          <span class="legend-dot legend-dot-b"></span>

      <!-- Grid -->
      <div class="grid-wrapper">

      <!-- Actions -->
      <div class="actions-row">
        <button class="btn" id="btn-add-week">

        </button>
        <button class="btn" id="btn-remove-week">
          <span data-lucide="minus"></span>

      <!-- Stats -->

      </nav>
      <p class="footer-copy" data-i18n="footer.copy">© 2026 Lina. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/i18n.js"></script>
  <script>
  (function () {
    'use strict';

    const STORAGE_KEY = 'lina-care-schedule';
    const DAY_KEYS = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];
    const MAX_WEEKS = 12;
    const MIN_WEEKS = 2;

    // ── State ────────────────────────────────────────────────────────────────

    let state = defaultState();
    let T = null; // current translation object

    function defaultState() {
      return {
        parentA: '',
        parentB: '',
        startDate: nextMonday(),
        weeks: 2,
        cells: Array(14).fill(null)
      };
    }

    function nextMonday() {
      const d = new Date();
      const day = d.getDay();
      const diff = day === 1 ? 0 : (8 - day) % 7;
      d.setDate(d.getDate() + diff);
      return toDateStr(d);
    }

    function toDateStr(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${dd}`;
    }

    function mondayOf(dateStr) {
      const [y, m, d] = dateStr.split('-').map(Number);
      const date = new Date(y, m - 1, d);
      const day = date.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      date.setDate(date.getDate() + diff);
      return toDateStr(date);
    }

    function saveState() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (_) {}
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        state = { ...defaultState(), ...parsed };
        state.weeks = Math.max(MIN_WEEKS, Math.min(MAX_WEEKS, state.weeks | 0));
        const expectedLen = state.weeks * 7;
        if (state.cells.length !== expectedLen) {
          const cells = Array(expectedLen).fill(null);
          for (let i = 0; i < Math.min(state.cells.length, expectedLen); i++) {
            cells[i] = state.cells[i];
          }
          state.cells = cells;
        }
      } catch (_) {}
    }

    // ── Stats ─────────────────────────────────────────────────────────────────

    function calcStats() {
      const { cells, weeks } = state;
      const totalDays = weeks * 7;
      const totalWeekendDays = weeks * 3;
      let aTotal = 0, bTotal = 0, aWknd = 0, bWknd = 0;
      let fullWkndA = 0, fullWkndB = 0;
      let switches = 0;

      for (let w = 0; w < weeks; w++) {
        const fri = cells[w * 7 + 4];
        const sat = cells[w * 7 + 5];
        const sun = cells[w * 7 + 6];
        if (fri === 'A' && sat === 'A' && sun === 'A') fullWkndA++;
        if (fri === 'B' && sat === 'B' && sun === 'B') fullWkndB++;
      }

      let lastAssigned = null;
      for (let i = 0; i < totalDays; i++) {
        const c = cells[i];
        const dow = i % 7; // 0=Mon…6=Sun
        if (c === 'A') { aTotal++; if (dow >= 4) aWknd++; }
        else if (c === 'B') { bTotal++; if (dow >= 4) bWknd++; }
        if (c && lastAssigned && c !== lastAssigned) switches++;
        if (c) lastAssigned = c;
      }

      return {
        totalDays, totalWeekendDays, totalFullWeekends: weeks,
        aTotal, bTotal, aWknd, bWknd,
        fullWkndA, fullWkndB, switches
      };
    }

    // ── Rendering ─────────────────────────────────────────────────────────────

    function parentLabel(who) {
      const name = who === 'A' ? state.parentA : state.parentB;
      return name && name.trim() ? name.trim() : (who === 'A' ? 'A' : 'B');
    }

    function fmtDate(d) {
      if (!d) return '';
      const lang = document.documentElement.lang || 'en';
      return d.toLocaleDateString(lang, { month: 'short', day: 'numeric' });
    }

    function weekDates(weekIdx) {
      if (!state.startDate) return '';
      const [y, m, d] = state.startDate.split('-').map(Number);
      const start = new Date(y, m - 1, d + weekIdx * 7);
      const end = new Date(y, m - 1, d + weekIdx * 7 + 6);
      return `${fmtDate(start)} – ${fmtDate(end)}`;
    }

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function renderGrid() {
      if (!T) return;
      const cs = T.cs;
      const grid = document.getElementById('schedule-grid');
      if (!grid) return;

      let html = '<div class="grid-table" role="grid">';

      // Header row
      html += '<div class="grid-header" role="row">';
      html += '<div class="grid-week-col" role="columnheader" aria-label=""></div>';
      DAY_KEYS.forEach((key, i) => {
        const isWeekend = i >= 4;
        const isSep = i === 4;
        const cls = ['grid-day-header', isWeekend ? 'weekend' : '', isSep ? 'sep' : ''].filter(Boolean).join(' ');
        html += `<div class="${cls}" role="columnheader">${esc(cs[key])}</div>`;
      });
      html += '</div>';

      // Week rows
      for (let w = 0; w < state.weeks; w++) {
        const dates = weekDates(w);
        html += '<div class="grid-row" role="row">';
        html += `<div class="grid-week-label" role="rowheader">
          <span class="week-num">${esc(cs.week)} ${w + 1}</span>
          ${dates ? `<span class="week-dates">${esc(dates)}</span>` : ''}
        </div>`;

        for (let d = 0; d < 7; d++) {
          const idx = w * 7 + d;
          const val = state.cells[idx];
          const isWeekend = d >= 4;
          const isSep = d === 4;
          const cls = [
            'grid-cell',
            isWeekend ? 'weekend' : '',
            isSep ? 'sep' : '',
            val === 'A' ? 'cell-a' : val === 'B' ? 'cell-b' : ''
          ].filter(Boolean).join(' ');
          const ariaLabel = val ? esc(parentLabel(val)) : esc(cs.unassigned);
          const label = val ? esc(parentLabel(val)) : '';
          html += `<div class="${cls}" data-idx="${idx}" role="gridcell" tabindex="0" aria-label="${ariaLabel}">
            ${label ? `<span class="cell-label">${label}</span>` : ''}
          </div>`;
        }
        html += '</div>';
      }

      html += '</div>';
      grid.innerHTML = html;
      renderStats();
      updateLegend();
      updateButtonStates();
    }

    function renderStats() {
      if (!T) return;
      const cs = T.cs;
      const sg = document.getElementById('stats-grid');
      if (!sg) return;
      const s = calcStats();
      const pct = (n, total) => total > 0 ? Math.round(n / total * 100) : 0;
      const labelA = esc(parentLabel('A'));
      const labelB = esc(parentLabel('B'));

      const aPct = pct(s.aTotal, s.totalDays);
      const bPct = pct(s.bTotal, s.totalDays);
      const aWPct = pct(s.aWknd, s.totalWeekendDays);
      const bWPct = pct(s.bWknd, s.totalWeekendDays);

      sg.innerHTML = `
        <div class="stat-block">
          <div class="stat-block-label" data-i18n="cs.statsDaySplit">${esc(cs.statsDaySplit)}</div>
          <div class="stat-row"><span class="stat-swatch stat-swatch-a"></span>${labelA}: ${s.aTotal} ${esc(cs.days)} (${aPct}%)</div>
          <div class="stat-bar-wrap"><div class="stat-bar-fill stat-bar-fill-a" style="width:${aPct}%"></div></div>
          <div class="stat-row"><span class="stat-swatch stat-swatch-b"></span>${labelB}: ${s.bTotal} ${esc(cs.days)} (${bPct}%)</div>
          <div class="stat-bar-wrap"><div class="stat-bar-fill stat-bar-fill-b" style="width:${bPct}%"></div></div>
        </div>
        <div class="stat-block">
          <div class="stat-block-label" data-i18n="cs.statsWeekendSplit">${esc(cs.statsWeekendSplit)}</div>
          <div class="stat-row"><span class="stat-swatch stat-swatch-a"></span>${labelA}: ${s.aWknd} ${esc(cs.of)} ${s.totalWeekendDays} (${aWPct}%)</div>
          <div class="stat-bar-wrap"><div class="stat-bar-fill stat-bar-fill-a" style="width:${aWPct}%"></div></div>
          <div class="stat-row"><span class="stat-swatch stat-swatch-b"></span>${labelB}: ${s.bWknd} ${esc(cs.of)} ${s.totalWeekendDays} (${bWPct}%)</div>
          <div class="stat-bar-wrap"><div class="stat-bar-fill stat-bar-fill-b" style="width:${bWPct}%"></div></div>
        </div>
        <div class="stat-block">
          <div class="stat-block-label" data-i18n="cs.statsFullWeekends">${esc(cs.statsFullWeekends)}</div>
          <div class="stat-row"><span class="stat-swatch stat-swatch-a"></span>${labelA}: ${s.fullWkndA} ${esc(cs.of)} ${s.totalFullWeekends}</div>
          <div class="stat-row"><span class="stat-swatch stat-swatch-b"></span>${labelB}: ${s.fullWkndB} ${esc(cs.of)} ${s.totalFullWeekends}</div>
        </div>
        <div class="stat-block">
          <div class="stat-block-label" data-i18n="cs.statsSwitches">${esc(cs.statsSwitches)}</div>
          <div class="stat-single">${s.switches}</div>
        </div>
      `;
    }

    function updateLegend() {
      const a = document.getElementById('legend-a');
      const b = document.getElementById('legend-b');
      if (a) a.textContent = parentLabel('A');
      if (b) b.textContent = parentLabel('B');
    }

    function updateButtonStates() {
      const add = document.getElementById('btn-add-week');
      const rem = document.getElementById('btn-remove-week');
      if (add) add.disabled = state.weeks >= MAX_WEEKS;
      if (rem) rem.disabled = state.weeks <= MIN_WEEKS;
    }

    // ── Cell interaction ───────────────────────────────────────────────────────

    function toggleCell(idx) {
      const cur = state.cells[idx];
      state.cells[idx] = cur === null ? 'A' : cur === 'A' ? 'B' : null;
      saveState();
      renderGrid();
    }

    // ── Week add/remove ────────────────────────────────────────────────────────

    function setWeeks(n) {
      n = Math.max(MIN_WEEKS, Math.min(MAX_WEEKS, n));
      if (n === state.weeks) return;
      if (n > state.weeks) {
        state.cells = [...state.cells, ...Array((n - state.weeks) * 7).fill(null)];
      } else {
        state.cells = state.cells.slice(0, n * 7);
      }
      state.weeks = n;
      document.getElementById('input-weeks').value = n;
      saveState();
      renderGrid();
    }

    // ── PDF export ─────────────────────────────────────────────────────────────

    function buildScheduleHTML() {
      const cs = T.cs;
      const lang = document.documentElement.lang || 'en';
      const { parentA, parentB, startDate, weeks, cells } = state;
      const nameA = parentLabel('A');
      const nameB = parentLabel('B');

      const [y, m, d] = startDate ? startDate.split('-').map(Number) : [0, 0, 0];
      const startD = startDate ? new Date(y, m - 1, d) : null;
      const endD = startDate ? new Date(y, m - 1, d + weeks * 7 - 1) : null;
      const dateRange = startD
        ? `${fmtDate(startD)} – ${fmtDate(endD)}`
        : '';

      const cellBg = v => v === 'A' ? '#0D6B64' : v === 'B' ? '#E0A040' : '#F4F4F2';
      const cellFg = v => (v === 'A' || v === 'B') ? '#fff' : '#888';
      const cellTxt = v => v === 'A' ? nameA : v === 'B' ? nameB : '';

      const thStyle = 'font-size:10px;text-align:center;padding:7px 6px;background:#f5f5f3;border:1px solid #ddd;text-transform:uppercase;letter-spacing:0.05em;color:#555;';
      const dayHeaders = DAY_KEYS.map((k, i) =>
        `<th style="${thStyle}${i >= 4 ? 'background:#eeede8;' : ''}">${esc(cs[k])}</th>`
      ).join('');

      let rows = '';
      for (let w = 0; w < weeks; w++) {
        const wStart = startDate ? new Date(y, m - 1, d + w * 7) : null;
        const wEnd = startDate ? new Date(y, m - 1, d + w * 7 + 6) : null;
        const wDates = wStart ? `${fmtDate(wStart)} – ${fmtDate(wEnd)}` : '';
        let tds = '';
        for (let dd2 = 0; dd2 < 7; dd2++) {
          const idx = w * 7 + dd2;
          const v = cells[idx];
          const bg = cellBg(v);
          const fg = cellFg(v);
          const sepBorder = dd2 === 4 ? 'border-left:2px solid #ccc;' : '';
          tds += `<td style="background:${bg};color:${fg};font-size:11px;font-weight:600;text-align:center;padding:9px 4px;border:1px solid #ddd;${sepBorder}">${esc(cellTxt(v))}</td>`;
        }
        rows += `<tr>
          <td style="font-size:11px;padding:8px 14px;border:1px solid #ddd;white-space:nowrap;background:#fafaf8;">
            <strong>${esc(cs.week)} ${w + 1}</strong>${wDates ? `<br><span style="color:#888;font-size:10px;">${esc(wDates)}</span>` : ''}
          </td>${tds}
        </tr>`;
      }

      const s = calcStats();
      const pct = (n, total) => total > 0 ? Math.round(n / total * 100) : 0;

      return `<!DOCTYPE html>
<html lang="${lang}">
<head>
  <meta charset="UTF-8" />
  <title>${esc(cs.heading)} — ${esc(nameA)} &amp; ${esc(nameB)}</title>
  <style>
    body { font-family: -apple-system, Helvetica Neue, sans-serif; margin: 40px; color: #1A1E23; }
    h1 { font-size: 20px; font-weight: 600; margin: 0 0 4px; letter-spacing: -0.02em; }
    .sub { color: #666; font-size: 13px; margin: 0 0 28px; }
    table { border-collapse: collapse; width: 100%; }
    .stats { margin-top: 32px; font-size: 13px; }
    .stats h2 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #666; margin: 0 0 12px; }
    .stats table { width: auto; }
    .stats td { padding: 3px 20px 3px 0; color: #333; }
    @media print { @page { margin: 20mm; } }
  </style>
</head>
<body>
  <h1>${esc(cs.heading)}</h1>
  <p class="sub">${esc(nameA)} &amp; ${esc(nameB)}${dateRange ? ' · ' + esc(dateRange) : ''}</p>
  <table>
    <thead>
      <tr>
        <th style="font-size:10px;padding:7px 14px;background:#f5f5f3;border:1px solid #ddd;text-align:left;"></th>
        ${dayHeaders}
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>
  <div class="stats">
    <h2>${esc(cs.statsTitle)}</h2>
    <table>
      <tr><td style="color:#0D6B64;font-weight:600;">${esc(nameA)}</td><td>${s.aTotal} ${esc(cs.days)} (${pct(s.aTotal, s.totalDays)}%)</td></tr>
      <tr><td style="color:#E0A040;font-weight:600;">${esc(nameB)}</td><td>${s.bTotal} ${esc(cs.days)} (${pct(s.bTotal, s.totalDays)}%)</td></tr>
      <tr><td colspan="2" style="padding-top:8px;"></td></tr>
      <tr><td style="color:#666;">${esc(cs.statsFullWeekends)}</td><td>${esc(nameA)}: ${s.fullWkndA}, ${esc(nameB)}: ${s.fullWkndB}</td></tr>
      <tr><td style="color:#666;">${esc(cs.statsSwitches)}</td><td>${s.switches}</td></tr>
    </table>
  </div>
</body>
</html>`;
    }

    function exportToPDF() {
      const html = buildScheduleHTML();
      const win = window.open('', '_blank');
      if (!win) { alert('Please allow popups to export PDF.'); return; }
      win.document.write(html);
      win.document.close();
      setTimeout(() => win.print(), 400);
    }

    // ── Input binding ──────────────────────────────────────────────────────────

    function bindInputs() {
      const inputA = document.getElementById('input-parent-a');
      const inputB = document.getElementById('input-parent-b');
      const inputDate = document.getElementById('input-start-date');
      const inputWeeks = document.getElementById('input-weeks');

      // Set initial values
      inputA.value = state.parentA;
      inputB.value = state.parentB;
      inputDate.value = state.startDate;
      inputWeeks.value = state.weeks;

      inputA.addEventListener('input', () => {
        state.parentA = inputA.value;
        saveState();
        updateLegend();
        renderStats();
      });

      inputB.addEventListener('input', () => {
        state.parentB = inputB.value;
        saveState();
        updateLegend();
        renderStats();
      });

      inputDate.addEventListener('change', () => {
        const val = inputDate.value;
        if (!val) return;
        const snapped = mondayOf(val);
        state.startDate = snapped;
        inputDate.value = snapped;
        saveState();
        renderGrid();
      });

      inputWeeks.addEventListener('change', () => {
        const n = parseInt(inputWeeks.value, 10);
        if (!isNaN(n)) setWeeks(n);
      });

      document.getElementById('btn-add-week').addEventListener('click', () => {
        setWeeks(state.weeks + 1);
      });

      document.getElementById('btn-remove-week').addEventListener('click', () => {
        setWeeks(state.weeks - 1);
      });

      document.getElementById('btn-reset').addEventListener('click', () => {
        const fresh = defaultState();
        state.cells = Array(state.weeks * 7).fill(null);
        saveState();
        renderGrid();
      });

      document.getElementById('btn-export').addEventListener('click', exportToPDF);

      // Grid interaction via event delegation
      const gridEl = document.getElementById('schedule-grid');
      gridEl.addEventListener('click', e => {
        const cell = e.target.closest('[data-idx]');
        if (!cell) return;
        toggleCell(parseInt(cell.dataset.idx, 10));
      });
      gridEl.addEventListener('keydown', e => {
        if (e.key !== 'Enter' && e.key !== ' ') return;
        const cell = e.target.closest('[data-idx]');
        if (!cell) return;
        e.preventDefault();
        const idx = parseInt(cell.dataset.idx, 10);
        toggleCell(idx);
        requestAnimationFrame(() => {
          const restored = document.querySelector(`[data-idx="${idx}"]`);
          if (restored) restored.focus();
        });
      });
    }

    // ── Boot ───────────────────────────────────────────────────────────────────

    loadState();
    bindInputs();

    document.addEventListener('lina:langchange', e => {
      T = e.detail.t;
      renderGrid();
    });

    // Init Lucide icons once DOM is ready (i18n.js already waits for DOMContentLoaded)
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
    } else {
      lucide.createIcons();
    }

  }());
  </script>
</body>
</html>
