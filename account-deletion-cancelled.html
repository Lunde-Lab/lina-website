<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="canonical" href="https://getlina.app/account-deletion-cancelled.html" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="assets/logos/Logomark_1.svg" />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <title>Deletion cancelled — Lina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #0D6B64;
      --primary-dark: #0a5650;
      --bg: #F8F8F6;
      --text: #1A1E23;
      --text-secondary: #50565E;
      --border: #E2E2DE;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* ── Main layout ── */
    .page-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 64px;
    }

    .logo-top {
      margin-bottom: 48px;
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Icon wrap (matches .feature-icon) ── */
    .icon-wrap {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: #EAF4F3;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--primary);
    }

    /* ── Heading ── */
    .card h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.3;
    }

    /* ── Body text ── */
    .card p {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.65;
    }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
    }

    /* ── Close button ── */
    .btn-close {
      align-self: flex-start;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      border-radius: 8px;
      padding: 12px 24px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-close:hover {
      background: var(--border);
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 48px 24px;
    }

    .footer-inner {
      max-width: 1080px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .footer-nav {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .footer-nav-row {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .footer-nav-row a {
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.15s;
    }

    .footer-nav-row a:hover {
      color: var(--text);
    }

    .footer-copy {
      font-size: 12px;
      color: var(--text-secondary);
      opacity: 0.7;
    }

    @media (max-width: 599px) {
      footer {
        padding: 32px 16px;
      }

      .footer-nav-row {
        gap: 16px;
      }

      .footer-nav-row a {
        font-size: 12px;
      }
    }

    @media (max-width: 600px) {
      .card {
        padding: 28px 24px;
      }
    }
  </style>
</head>
<body>

  <div class="page-wrapper">

    <div class="logo-top">
      <a href="index.html">
        <img src="assets/logos/Logomark_1.svg" alt="Lina logo" height="32" />
      </a>
    </div>

    <div class="card">

      <div class="icon-wrap" aria-hidden="true">
        <i data-lucide="circle-check" width="20" height="20"></i>
      </div>

      <h1>Deletion cancelled</h1>

      <p>Your account deletion has been cancelled. Your account is active and nothing has been removed. You can continue using Lina as normal.</p>

      <hr class="divider" />

      <button class="btn-close" onclick="window.close()">Close</button>

    </div>

  </div>

  <!-- Footer -->
  <footer>
    <div class="footer-inner">
      <img src="assets/logos/Logomark_1.svg" alt="Lina logo" height="24" />
      <nav class="footer-nav" aria-label="Footer navigation">
        <div class="footer-nav-row">
          <a href="/care-schedule/">Samværsplan</a>
          <a href="/care-agreement/">Samværsavtale</a>
          <a href="/faq/">FAQ</a>
          <a href="/professionals.html">Professionals</a>
        </div>
        <div class="footer-nav-row">
          <a href="/terms/">Terms of Service</a>
          <a href="/privacy/">Privacy Policy</a>
          <a href="/contact.html">Contact</a>
          <a href="/account-deletion.html">Account deletion</a>
        </div>
      </nav>
      <p class="footer-copy">© 2026 Lina. All rights reserved.</p>
    </div>
  </footer>

  <script>
    lucide.createIcons();
  </script>

</body>
</html>
