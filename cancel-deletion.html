<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="canonical" href="https://getlina.app/cancel-deletion.html" />
  <link rel="icon" type="image/svg+xml" href="/assets/logos/Logomark_1.svg" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <title>Cancel account deletion — Lina</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #0D6B64;
      --primary-dark: #0a5650;
      --bg: #F8F8F6;
      --text: #1A1E23;
      --text-secondary: #50565E;
      --border: #E2E2DE;
      --success-bg: #EAF4F3;
      --success-border: #b8deda;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    /* ── Logo ── */
    .logo {
      margin-bottom: 40px;
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Icon wrap ── */
    .icon-wrap {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .icon-wrap.success {
      background: var(--success-bg);
      color: var(--primary);
    }

    .icon-wrap.neutral {
      background: #F0F0ED;
      color: var(--text-secondary);
    }

    /* ── Headings ── */
    .card h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.3;
    }

    /* ── Body text ── */
    .card p {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.65;
    }

    /* ── Error banner ── */
    .error-banner {
      background: #FDF2F1;
      border: 1px solid #f5c6c2;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
      color: #C0392B;
      line-height: 1.5;
    }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
    }

    /* ── Confirm button ── */
    .btn-confirm {
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 13px 24px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-confirm:hover:not(:disabled) {
      background: var(--primary-dark);
    }

    .btn-confirm:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    /* ── Spinner ── */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    /* ── Hidden utility ── */
    .hidden { display: none !important; }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      body {
        padding: 32px 16px;
        justify-content: flex-start;
      }

      .logo {
        margin-bottom: 28px;
      }

      .card {
        padding: 28px 24px;
        gap: 16px;
      }
    }
  </style>
</head>
<body>

  <div class="logo">
    <a href="/">
      <img src="/assets/logos/Logomark_1.svg" alt="Lina" height="32" />
    </a>
  </div>

  <!-- State: confirm -->
  <div class="card" id="view-confirm">
    <div class="icon-wrap neutral" aria-hidden="true">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 3-6.7"></path>
        <polyline points="3 4 3 10 9 10"></polyline>
      </svg>
    </div>

    <h1>Cancel account deletion</h1>

    <p>You're about to cancel the scheduled deletion of your Lina account. Your account and data will be kept.</p>

    <div id="confirm-error" class="error-banner hidden" role="alert"></div>

    <hr class="divider" />

    <button class="btn-confirm" id="btn-confirm" type="button">
      <span id="btn-label">Confirm cancellation</span>
    </button>
  </div>

  <!-- State: invalid/missing token -->
  <div class="card hidden" id="view-invalid">
    <div class="icon-wrap neutral" aria-hidden="true">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"></line>
      </svg>
    </div>

    <h1>Link invalid or expired</h1>

    <p>This link is invalid or has expired. Please request a new cancellation link from within the Lina app, or contact us at <a href="mailto:support@getlina.app" style="color: var(--primary);">support@getlina.app</a>.</p>
  </div>

  <script>
    (function () {
      var ENDPOINT = 'https://api.getlina.app/functions/v1/confirm-delete-account';

      var params = new URLSearchParams(window.location.search);
      var token = params.get('token');

      var viewConfirm = document.getElementById('view-confirm');
      var viewInvalid = document.getElementById('view-invalid');
      var btnConfirm = document.getElementById('btn-confirm');
      var btnLabel   = document.getElementById('btn-label');
      var errorBox   = document.getElementById('confirm-error');

      function show(view) {
        [viewConfirm, viewInvalid].forEach(function (v) {
          v.classList.add('hidden');
        });
        view.classList.remove('hidden');
      }

      // No token → invalid
      if (!token || token.trim() === '') {
        show(viewInvalid);
        return;
      }

      // Token present → show confirm view
      show(viewConfirm);

      var submitted = false;

      btnConfirm.addEventListener('click', function () {
        if (submitted) return;
        submitted = true;

        // Loading state
        btnConfirm.disabled = true;
        btnLabel.textContent = '';
        var spinner = document.createElement('span');
        spinner.className = 'spinner';
        spinner.setAttribute('aria-hidden', 'true');
        btnConfirm.appendChild(spinner);
        btnConfirm.insertAdjacentText('beforeend', ' Cancelling…');
        errorBox.classList.add('hidden');
        errorBox.textContent = '';

        fetch(ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: token })
        })
        .then(function (res) {
          if (res.ok) {
            return res.json().then(function (data) {
              if (data && typeof data.redirect === 'string') {
                window.location.assign(data.redirect);
              } else {
                // Fallback if redirect field missing
                window.location.assign('/account-deletion-cancelled.html');
              }
            });
          }

          // Try to extract an error message from the response body
          return res.text().then(function (body) {
            var message;
            try {
              var json = JSON.parse(body);
              message = json.message || json.error || null;
            } catch (e) {
              message = null;
            }
            throw new Error(message || 'Something went wrong. Please try again or contact support@getlina.app.');
          });
        })
        .catch(function (err) {
          // Re-enable button for retry only if it was a network/server error
          submitted = false;
          btnConfirm.disabled = false;
          spinner.remove();
          btnLabel.textContent = 'Confirm cancellation';

          errorBox.textContent = err.message || 'Something went wrong. Please try again or contact support@getlina.app.';
          errorBox.classList.remove('hidden');
        });
      });
    })();
  </script>

</body>
</html>
