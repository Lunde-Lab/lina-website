<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="/assets/logos/Logomark_1.svg" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <title>Lina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #0D6B64;
      --primary-dark: #0a5650;
      --bg: #F8F8F6;
      --text: #1A1E23;
      --text-secondary: #50565E;
      --border: #E2E2DE;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* ── Nav ── */
    nav {
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .nav-inner {
      max-width: 520px;
      margin: 0 auto;
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
    }

    .logo-link {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-mark {
      width: 24px;
      height: 24px;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 600;
      color: var(--primary);
      letter-spacing: -0.02em;
    }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      padding: 52px 24px 80px;
    }

    .invite-card {
      width: 100%;
      max-width: 480px;
    }

    /* ── Header ── */
    .invite-header {
      margin-bottom: 32px;
    }

    .invite-header h1 {
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.25;
      color: var(--text);
      margin-bottom: 12px;
    }

    .invite-header p {
      font-size: 16px;
      color: var(--text-secondary);
      line-height: 1.7;
    }

    /* ── Code section ── */
    .code-section {
      margin-bottom: 32px;
    }

    .code-section.hidden {
      display: none;
    }

    .code-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }

    .code-box {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
    }

    .code-value {
      flex: 1;
      min-width: 0;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.14em;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .copy-btn {
      flex-shrink: 0;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 18px;
      font-size: 14px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background 0.15s;
    }

    .copy-btn:hover {
      background: var(--primary-dark);
    }

    .copy-btn.copied {
      background: #3a8a6e;
    }

    .instruction {
      margin-top: 14px;
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 32px 0;
    }

    /* ── Features ── */
    .features-list {
      list-style: none;
      margin-bottom: 32px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .features-list li {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.55;
    }

    .features-list li::before {
      content: '';
      flex-shrink: 0;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--primary);
      margin-top: 8px;
    }

    /* ── Store buttons ── */
    .store-buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn-store {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--text);
      color: #fff;
      border-radius: 10px;
      padding: 14px 20px;
      font-size: 15px;
      font-weight: 500;
      transition: background 0.15s;
    }

    .btn-store:hover {
      background: #2c333b;
    }

    .btn-store svg {
      flex-shrink: 0;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      main {
        padding: 36px 20px 64px;
      }

      .invite-header h1 {
        font-size: 23px;
      }

      .code-value {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="https://getlina.app/" class="logo-link">
        <img src="/assets/logos/Logomark_1.svg" alt="Lina" class="logo-mark" width="24" height="24" />
        <span class="logo-text">Lina</span>
      </a>
    </div>
  </nav>

  <main>
    <div class="invite-card">

      <div class="invite-header">
        <h1 id="invite-title"></h1>
        <p id="invite-desc"></p>
      </div>

      <div id="code-section" class="code-section hidden">
        <p id="code-label" class="code-label"></p>
        <div class="code-box">
          <span id="invite-code" class="code-value"></span>
          <button id="copy-btn" class="copy-btn" type="button"></button>
        </div>
        <p id="instruction" class="instruction"></p>
      </div>

      <div class="divider"></div>

      <ul id="features-list" class="features-list"></ul>

      <div class="store-buttons">
        <a href="https://apps.apple.com/us/app/lina-co-parenting/id6757200671" class="btn-store">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
          </svg>
          <span id="appstore-label"></span>
        </a>
        <a href="https://play.google.com/store/apps/details?id=com.getlina.lina" class="btn-store">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M3.18 23.76c.35.2.74.24 1.11.12l12.5-7.21-2.79-2.79-10.82 9.88zm-1.15-20.39A1.99 1.99 0 0 0 1.75 5v14c0 .61.27 1.16.7 1.54l.08.07 7.84-7.84v-.19L3.03 3.37zm17.09 9.1-2.67-1.54-3.07 3.07 3.07 3.07 2.69-1.55c.77-.44.77-1.6-.02-2.05zM4.29.12 16.79 7.33l-2.79 2.79L3.18.24A1.76 1.76 0 0 1 4.29.12z"/>
          </svg>
          <span id="playstore-label"></span>
        </a>
      </div>

    </div>
  </main>

  <script>
    const translations = {

        title: "You've been invited to Lina",
        description: "Lina is an app for parents who share care. One calm, structured line between two homes. Everything about your child, kept together in one place.",
        no_code_title: "Lina — co-parenting, simplified",
        no_code_description: "Lina is an app for parents who share care. One calm, structured line between two homes. Practical information about your child, gathered in one place.",
        code_label: "Your invitation code",
        copy: "Copy",
        copied: "Copied",
        instruction: "Download the app and enter the code to connect.",
        features: [
          "Messages between you and your co-parent",
          "Shared album with photos from both homes",
          "Contact list for school, health care, and key people",
          "Equipment list — keep track of what belongs where"
        ],
        app_store: "Download on the App Store",
        play_store: "Get on Google Play"
      },

        title: "Du er invitert til Lina",

        no_code_title: "Lina — foreldresamarbeid, forenklet",
        no_code_description: "Lina er en app for foreldre som deler omsorg. Én rolig, strukturert linje mellom to hjem. Praktisk informasjon om barnet, samlet på ett sted.",
        code_label: "Din invitasjonskode",
        copy: "Kopier",
        copied: "Kopiert",
        instruction: "Last ned appen og skriv inn koden for å koble dere sammen.",
        features: [
          "Meldinger mellom deg og din co-parent",
          "Delt album med bilder fra begge hjem",
          "Kontaktliste for skole, helsevesen og viktige personer",
          "Utstyrsliste — hold styr på hva som hører til hvor"
        ],
        app_store: "Last ned på App Store",
        play_store: "Hent på Google Play"
      },
      sv: {
        title: "Du är inbjuden till Lina",
        description: "Lina är en app för föräldrar som delar omsorg. En lugn, strukturerad linje mellan två hem. Allt om ditt barn, samlat på ett ställe.",
        no_code_title: "Lina — samföräldraskap, förenklat",
        no_code_description: "Lina är en app för föräldrar som delar omsorg. En lugn, strukturerad linje mellan två hem. Praktisk information om barnet, samlat på ett ställe.",
        code_label: "Din inbjudningskod",
        copy: "Kopiera",
        copied: "Kopierat",
        instruction: "Ladda ned appen och ange koden för att koppla ihop er.",
        features: [
          "Meddelanden mellan dig och din medförälder",
          "Delat album med bilder från båda hemmen",
          "Kontaktlista för skola, sjukvård och viktiga personer",
          "Utrustningslista — koll på vad som hör hemma var"
        ],
        app_store: "Ladda ned på App Store",
        play_store: "Hämta på Google Play"
      },
      da: {
        title: "Du er inviteret til Lina",
        description: "Lina er en app til forældre, der deler omsorg. Én rolig, struktureret linje mellem to hjem. Alt om dit barn, samlet ét sted.",
        no_code_title: "Lina — samforældreskab, forenklet",
        no_code_description: "Lina er en app til forældre, der deler omsorg. Én rolig, struktureret linje mellem to hjem. Praktisk information om barnet, samlet ét sted.",
        code_label: "Din invitationskode",
        copy: "Kopiér",
        copied: "Kopieret",
        instruction: "Download appen og indtast koden for at forbinde jer.",
        features: [
          "Beskeder mellem dig og din medforælder",
          "Delt album med billeder fra begge hjem",
          "Kontaktliste til skole, sundhedsvæsen og vigtige personer",
          "Udstyrliste — hold styr på, hvad der hører til hvor"
        ],
        app_store: "Download på App Store",
        play_store: "Hent på Google Play"
      },
      fi: {
        title: "Sinut on kutsuttu Linaan",
        description: "Lina on sovellus vanhemmille, jotka jakavat lapsen hoidon. Yksi rauhallinen, selkeä yhteys kahden kodin välillä. Kaikki lapsesta koottuna yhteen paikkaan.",
        no_code_title: "Lina — yhteishuoltajuus, yksinkertaistettuna",
        no_code_description: "Lina on sovellus vanhemmille, jotka jakavat lapsen hoidon. Yksi rauhallinen, selkeä yhteys kahden kodin välillä. Käytännöllistä tietoa lapsesta koottuna yhteen paikkaan.",
        code_label: "Kutsukoodisi",

        copied: "Kopioitu",
        instruction: "Lataa sovellus ja syötä koodi yhdistääksenne teidät.",
        features: [
          "Viestit sinun ja yhteishuoltajasi välillä",
          "Jaettu albumi molempien kotien kuvista",

          "Tavaralista — pidä kirjaa siitä, mitä kuuluu minne"
        ],
        app_store: "Lataa App Storesta",
        play_store: "Hanki Google Playsta"
      },
      de: {
        title: "Du wurdest zu Lina eingeladen",
        description: "Lina ist eine App für Eltern, die sich die Betreuung teilen. Eine ruhige, strukturierte Verbindung zwischen zwei Haushalten. Alles über dein Kind, an einem Ort.",
        no_code_title: "Lina — Co-Elternschaft, vereinfacht",
        no_code_description: "Lina ist eine App für Eltern, die sich die Betreuung teilen. Eine ruhige, strukturierte Verbindung zwischen zwei Haushalten. Praktische Informationen über dein Kind, an einem Ort gesammelt.",
        code_label: "Dein Einladungscode",
        copy: "Kopieren",
        copied: "Kopiert",
        instruction: "Lade die App herunter und gib den Code ein, um euch zu verbinden.",
        features: [
          "Nachrichten zwischen dir und deinem Co-Elternteil",
          "Geteiltes Album mit Fotos aus beiden Haushalten",
          "Kontaktliste für Schule, Gesundheitsversorgung und wichtige Personen",
          "Ausstattungsliste — behalte den Überblick, was wo hingehört"
        ],
        app_store: "Im App Store laden",
        play_store: "Bei Google Play holen"
      }
    };

    function detectLang() {
      const lang = (navigator.language || 'en').toLowerCase();
      const base = lang.split('-')[0];
      if (base === 'no' || base === 'nb' || base === 'nn') return 'nb';
      const supported = ['en', 'sv', 'da', 'fi', 'de'];
      return supported.includes(base) ? base : 'en';
    }

    function getCode() {
      return new URLSearchParams(window.location.search).get('code') || '';
    }

    const lang = detectLang();
    const t = translations[lang];
    const code = getCode();

    document.documentElement.lang = lang;

    document.getElementById('invite-title').textContent = code ? t.title : t.no_code_title;
    document.getElementById('invite-desc').textContent = code ? t.description : t.no_code_description;

    if (code) {
      const codeSection = document.getElementById('code-section');
      codeSection.classList.remove('hidden');
      document.getElementById('code-label').textContent = t.code_label;
      document.getElementById('invite-code').textContent = code;
      document.getElementById('instruction').textContent = t.instruction;

      const copyBtn = document.getElementById('copy-btn');
      copyBtn.textContent = t.copy;
      copyBtn.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(code);
        } catch (_) {
          const el = document.getElementById('invite-code');
          const range = document.createRange();
          range.selectNode(el);
          const sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);
        }
        copyBtn.textContent = t.copied;
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.textContent = t.copy;
          copyBtn.classList.remove('copied');
        }, 2000);
      });
    }

    const featuresList = document.getElementById('features-list');
    t.features.forEach(feature => {
      const li = document.createElement('li');
      li.textContent = feature;
      featuresList.appendChild(li);
    });

    document.getElementById('appstore-label').textContent = t.app_store;
    document.getElementById('playstore-label').textContent = t.play_store;
  </script>

</body>
</html>
